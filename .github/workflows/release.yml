name: Release

# CalVer release workflow.
#
# Tags are formatted as YYYY.MM.DD, with a `.N` suffix for additional releases
# on the same day (e.g. 2026.04.07, 2026.04.07.1, 2026.04.07.2).
#
# Manual only: trigger from the Actions tab when you're ready to cut a release.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y.%m.%d)"
          git fetch --tags --quiet
          # Find existing tags for today and pick the next free suffix.
          existing=$(git tag --list "${DATE}" "${DATE}.*" | sort -V)
          if [ -z "$existing" ]; then
            TAG="$DATE"
          else
            n=1
            while echo "$existing" | grep -qx "${DATE}.${n}"; do
              n=$((n + 1))
            done
            TAG="${DATE}.${n}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            --latest
